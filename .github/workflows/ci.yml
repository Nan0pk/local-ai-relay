name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  deterministic:
    name: ${{ matrix.os }} / Node 22
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run test:e2e
      - run: npm run build
      - run: npm run smoke:startup
      - run: npm run test:delivery
      - run: node scripts/validate-release.mjs

      - name: Check Bash entry points
        if: runner.os == 'Linux'
        shell: bash
        run: bash -n bootstrap.sh setup-linux.sh verify-all.sh

      - name: Parse PowerShell entry points
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $failed = $false
          foreach ($file in @('bootstrap.ps1', 'setup-windows.ps1')) {
            $tokens = $null
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile($file, [ref]$tokens, [ref]$errors) | Out-Null
            if ($errors.Count -gt 0) {
              $errors | ForEach-Object { Write-Error "${file}: $_" }
              $failed = $true
            }
          }
          if ($failed) { exit 1 }

      - name: Check batch entry-point structure
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          findstr /b /c:"@echo off" setup-windows.cmd >nul
          findstr /b /c:"@echo off" verify-all.cmd >nul
